<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Download LinkFam</title>

  <script>
    const iosLink = "https://apps.apple.com/us/app/linkfam/id6753126400";
    const androidLink = "https://play.google.com/store/apps/details?id=com.linkfam.app";
    const fallbackLink = "https://sites.google.com/view/linkfam/privacy-policy";

    const userAgent = navigator.userAgent || navigator.vendor || window.opera;

    if (/android/i.test(userAgent)) {
      window.location.href = androidLink;
    } else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
      window.location.href = iosLink;
    } else {
      window.location.href = fallbackLink;
    }
  </script>
</head>

<body>
  <h1>Download LinkFam</h1>
  <p>Redirecting you to the right app store...</p>

  <p>
    <a href="https://apps.apple.com/app/idYOUR_APP_ID">Download on iPhone</a>
  </p>

  <p>
    <a href="https://play.google.com/store/apps/details?id=com.linkfam.app">Download on Android</a>
  </p>
</body>
</html>
