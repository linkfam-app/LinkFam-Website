
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Add to LinkFam</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 18px;
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      color: #d8a85d;
      font-size: 30px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    p {
      color: #dddddd;
      line-height: 1.45;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      margin-top: 6px;
      padding: 13px;
      border: 1px solid #444444;
      border-radius: 10px;
      background: #ffffff;
      color: #111111;
      font-size: 16px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #d8a85d;
      color: #111111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .secondary {
      background: transparent;
      color: #d8a85d;
      border: 1px solid #d8a85d;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .progress {
      color: #d8a85d;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .review-box,
    .message-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.55;
      word-break: break-word;
    }

    .review-box {
      background: #111111;
      color: #eeeeee;
    }

    .message-box {
      display: none;
      border: 1px solid #333333;
      background: #111111;
      color: #eeeeee;
    }

    .message-box.info {
      display: block;
      border-color: #6f5a2f;
      color: #ffe3ae;
    }

    .message-box.success {
      display: block;
      border-color: #2f7a4f;
      background: #102417;
      color: #c9ffd9;
    }

    .message-box.error {
      display: block;
      border-color: #8a2c2c;
      background: #3a1111;
      color: #ffdede;
    }

    .success-screen {
      display: none;
      text-align: center;
    }

    .small {
      color: #bbbbbb;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card" id="formCard">
      <h1>Add to LinkFam</h1>
      <p>Submit a business or community resource to be reviewed before it appears in the app.</p>

      <form id="submissionForm">
        <div class="step active" data-step="0">
          <div class="progress">Step 1 of 5</div>

          <label for="submissionType">What are you adding?</label>
          <select id="submissionType" required>
            <option value="">Choose one</option>
            <option value="Business">Business</option>
            <option value="Community Resource">Community Resource</option>
          </select>

          <button type="button" data-next>Next</button>
        </div>

        <div class="step" data-step="1">
          <div class="progress">Step 2 of 5</div>

          <label for="name">Name</label>
          <input id="name" type="text" placeholder="Business or resource name" required />

          <label for="category">Category</label>
          <input id="category" type="text" placeholder="Food, health, legal, education, etc." required />

          <label for="description">Short Description</label>
          <textarea id="description" placeholder="Briefly describe what they offer"></textarea>

          <button type="button" data-next>Next</button>
          <button class="secondary" type="button" data-back>Back</button>
        </div>

        <div class="step" data-step="2">
          <div class="progress">Step 3 of 5</div>

          <label for="phone">Phone</label>
          <input id="phone" type="tel" placeholder="Phone number" />

          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Email address" />

          <label for="website">Website</label>
          <input id="website" type="url" placeholder="https://example.com" />

          <label for="instagram">Instagram</label>
          <input id="instagram" type="text" placeholder="@username" />

          <button type="button" data-next>Next</button>
          <button class="secondary" type="button" data-back>Back</button>
        </div>

        <div class="step" data-step="3">
          <div class="progress">Step 4 of 5</div>

          <label for="address">Address</label>
          <input id="address" type="text" placeholder="Street address" />

          <label for="city">City</label>
          <input id="city" type="text" placeholder="City" />

          <label for="state">State</label>
          <input id="state" type="text" placeholder="State" />

          <label for="zip">ZIP</label>
          <input id="zip" type="text" placeholder="ZIP code" />

          <button type="button" id="reviewButton">Review</button>
          <button class="secondary" type="button" data-back>Back</button>
        </div>

        <div class="step" data-step="4">
          <div class="progress">Step 5 of 5</div>

          <h2>Review Submission</h2>
          <div id="reviewBox" class="review-box"></div>

          <button id="submitButton" type="submit">Submit to LinkFam</button>
          <button class="secondary" type="button" data-back>Back</button>
        </div>
      </form>

      <div id="statusBox" class="message-box"></div>
    </section>

    <section class="card success-screen" id="successMessage">
      <h1>Submission Received</h1>
      <p>Your submission was successfully sent to LinkFam for review.</p>
      <p class="small" id="successDetails"></p>
      <button type="button" onclick="window.location.reload()">Submit Another</button>
    </section>
  </main>

  <script>
    const PARSE_SERVER_URL = "https://parseapi.back4app.com";
    const PARSE_APP_ID = "2AxqUa732w8sQviO38zmLdWlT1oQaJpKbq2NdwsR";
    const PARSE_REST_API_KEY = "jjegdXfbfeyGjxXsmSaqXJm19c1UZL1pxWXwO5iv";

    const steps = Array.from(document.querySelectorAll(".step"));
    const form = document.getElementById("submissionForm");
    const formCard = document.getElementById("formCard");
    const successMessage = document.getElementById("successMessage");
    const successDetails = document.getElementById("successDetails");
    const reviewBox = document.getElementById("reviewBox");
    const statusBox = document.getElementById("statusBox");
    const submitButton = document.getElementById("submitButton");

    let currentStep = 0;

    function getValue(id) {
      const element = document.getElementById(id);
      return element ? element.value.trim() : "";
    }

    function showStep(index) {
      if (index < 0 || index >= steps.length) return;

      currentStep = index;

      steps.forEach(function(step, stepIndex) {
        step.classList.toggle("active", stepIndex === currentStep);
      });

      clearStatus();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showStatus(type, message) {
      statusBox.className = "message-box " + type;
      statusBox.textContent = message;
      statusBox.style.display = "block";
    }

    function clearStatus() {
      statusBox.className = "message-box";
      statusBox.textContent = "";
      statusBox.style.display = "none";
    }

    function validateStep() {
      clearStatus();

      if (currentStep === 0 && !getValue("submissionType")) {
        showStatus("error", "Please choose Business or Community Resource.");
        return false;
      }

      if (currentStep === 1) {
        if (!getValue("name")) {
          showStatus("error", "Please enter a name.");
          return false;
        }

        if (!getValue("category")) {
          showStatus("error", "Please enter a category.");
          return false;
        }
      }

      return true;
    }

    function getFormData() {
      return {
        submissionType: getValue("submissionType"),
        name: getValue("name"),
        category: getValue("category"),
        description: getValue("description"),
        phone: getValue("phone"),
        email: getValue("email"),
        website: getValue("website"),
        instagram: getValue("instagram"),
        address: getValue("address"),
        city: getValue("city"),
        state: getValue("state"),
        zip: getValue("zip"),
        status: "pending",
        source: "web_submit_form"
      };
    }

    function escapeHTML(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderReview() {
      if (!validateStep()) return;

      const data = getFormData();

      reviewBox.innerHTML = `
        <strong>Type:</strong> ${escapeHTML(data.submissionType)}<br>
        <strong>Name:</strong> ${escapeHTML(data.name)}<br>
        <strong>Category:</strong> ${escapeHTML(data.category)}<br>
        <strong>Description:</strong> ${escapeHTML(data.description || "Not provided")}<br>
        <strong>Phone:</strong> ${escapeHTML(data.phone || "Not provided")}<br>
        <strong>Email:</strong> ${escapeHTML(data.email || "Not provided")}<br>
        <strong>Website:</strong> ${escapeHTML(data.website || "Not provided")}<br>
        <strong>Instagram:</strong> ${escapeHTML(data.instagram || "Not provided")}<br>
        <strong>Address:</strong> ${escapeHTML(data.address || "Not provided")}<br>
        <strong>City:</strong> ${escapeHTML(data.city || "Not provided")}<br>
        <strong>State:</strong> ${escapeHTML(data.state || "Not provided")}<br>
        <strong>ZIP:</strong> ${escapeHTML(data.zip || "Not provided")}
      `;

      showStep(4);
    }

    function getParseClassName(submissionType) {
      return submissionType === "Business"
        ? "BusinessSubmissions"
        : "CommunitySubmissions";
    }

    async function submitToBack4App(data) {
      if (!PARSE_APP_ID || PARSE_APP_ID.includes("PASTE_")) {
        throw new Error("Missing Back4App Application ID. Replace PARSE_APP_ID in the HTML.");
      }

      if (!PARSE_REST_API_KEY || PARSE_REST_API_KEY.includes("PASTE_")) {
        throw new Error("Missing Back4App REST API Key. Replace PARSE_REST_API_KEY in the HTML.");
      }

      const className = getParseClassName(data.submissionType);
      const url = `${PARSE_SERVER_URL}/classes/${className}`;

      const controller = new AbortController();
      const timeoutId = setTimeout(function() {
        controller.abort();
      }, 15000);

      try {
        const response = await fetch(url, {
          method: "POST",
          headers: {
            "X-Parse-Application-Id": PARSE_APP_ID,
            "X-Parse-REST-API-Key": PARSE_REST_API_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data),
          signal: controller.signal
        });

        const responseText = await response.text();

        if (!response.ok) {
          throw new Error(responseText || `Request failed with status ${response.status}`);
        }

        return responseText ? JSON.parse(responseText) : {};
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();

      clearStatus();

      const data = getFormData();

      if (!data.submissionType) {
        showStatus("error", "Failed: Missing submission type. Go back to Step 1.");
        return;
      }

      if (!data.name || !data.category) {
        showStatus("error", "Failed: Missing name or category. Go back to Step 2.");
        return;
      }

      try {
        submitButton.disabled = true;
        submitButton.textContent = "Submitting...";
        showStatus("info", "Submitting to LinkFam... Please wait.");

        const result = await submitToBack4App(data);

        showStatus("success", "Success: Your submission was sent to LinkFam.");

        formCard.style.display = "none";
        successMessage.style.display = "block";

        if (result && result.objectId) {
          successDetails.textContent = "Submission ID: " + result.objectId;
        }

        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch (error) {
        console.error("Submission failed:", error);

        const message = error.name === "AbortError"
          ? "Failed: The request timed out. Please check your internet connection and try again."
          : "Failed: " + error.message;

        showStatus("error", message);
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Submit to LinkFam";
      }
    }

    document.querySelectorAll("[data-next]").forEach(function(button) {
      button.addEventListener("click", function() {
        if (validateStep()) {
          showStep(currentStep + 1);
        }
      });
    });

    document.querySelectorAll("[data-back]").forEach(function(button) {
      button.addEventListener("click", function() {
        showStep(currentStep - 1);
      });
    });

    document.getElementById("reviewButton").addEventListener("click", renderReview);
    form.addEventListener("submit", handleSubmit);
  </script>
</body>
</html>
