
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Add to LinkFam</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333333;
      border-radius: 18px;
      padding: 22px;
    }

    h1 {
      margin: 0 0 8px;
      color: #d8a85d;
      font-size: 30px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    p {
      color: #dddddd;
      line-height: 1.45;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input,
    textarea,
    select {
      width: 100%;
      margin-top: 6px;
      padding: 13px;
      border: 1px solid #444444;
      border-radius: 10px;
      background: #ffffff;
      color: #111111;
      font-size: 16px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #d8a85d;
      color: #111111;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .secondary {
      background: transparent;
      color: #d8a85d;
      border: 1px solid #d8a85d;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .progress {
      color: #d8a85d;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .review-box,
    .message-box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      line-height: 1.55;
      word-break: break-word;
    }

    .review-box {
      background: #111111;
      color: #eeeeee;
    }

    .message-box {
      display: none;
      border: 1px solid #333333;
      background: #111111;
      color: #eeeeee;
    }

    .message-box.info {
      display: block;
      border-color: #6f5a2f;
      color: #ffe3ae;
    }

    .message-box.success {
      display: block;
      border-color: #2f7a4f;
      background: #102417;
      color: #c9ffd9;
    }

    .message-box.error {
      display: block;
      border-color: #8a2c2c;
      background: #3a1111;
      color: #ffdede;
    }

    .success-screen {
      display: none;
      text-align: center;
    }

    .small {
      color: #bbbbbb;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="container">
    <section class="card" id="formCard">
      <h1>Add to LinkFam</h1>
      <p>Submit a business or community resource to be reviewed before it appears in the app.</p>

      <form id="submissionForm" novalidate>
        <div id="step1" class="step active">
          <div class="progress">Step 1 of 5</div>

          <label for="submissionType">What are you adding?</label>
          <select id="submissionType">
            <option value="">Choose one</option>
            <option value="Business">Business</option>
            <option value="Community Resource">Community Resource</option>
          </select>

          <button type="button" onclick="nextStep()">Next</button>
        </div>

        <div id="step2" class="step">
          <div class="progress">Step 2 of 5</div>

          <label id="nameLabel" for="name">Name</label>
          <input id="name" type="text" placeholder="Business or resource name" />

          <label id="categoryLabel" for="category">Category</label>
          <select id="category">
            <option value="">Choose a category</option>
          </select>

          <div id="organizationGroup" style="display: none;">
            <label for="organizationName">Organization name, if applicable</label>
            <input id="organizationName" type="text" placeholder="Organization name" />
          </div>

          <label for="description">Short Description</label>
          <textarea id="description" placeholder="Briefly describe what they offer"></textarea>

          <button type="button" onclick="nextStep()">Next</button>
          <button class="secondary" type="button" onclick="prevStep()">Back</button>
        </div>

        <div id="step3" class="step">
          <div class="progress">Step 3 of 5</div>

          <label for="phone">Phone</label>
          <input id="phone" type="tel" placeholder="Phone number" />

          <label for="email">Email</label>
          <input id="email" type="email" placeholder="Email address" />

          <label for="website">Website</label>
          <input id="website" type="url" placeholder="https://example.com" />

          <label for="instagram">Instagram</label>
          <input id="instagram" type="text" placeholder="@username" />

          <button type="button" onclick="nextStep()">Next</button>
          <button class="secondary" type="button" onclick="prevStep()">Back</button>
        </div>

        <div id="step4" class="step">
          <div class="progress">Step 4 of 5</div>

          <label for="address">Address</label>
          <input id="address" type="text" placeholder="Street address or service area" />

          <label for="city">City</label>
          <input id="city" type="text" placeholder="City" />

          <label for="state">State</label>
          <input id="state" type="text" placeholder="State" />

          <label for="zip">ZIP</label>
          <input id="zip" type="text" placeholder="ZIP code" />

          <button type="button" onclick="showReview()">Review</button>
          <button class="secondary" type="button" onclick="prevStep()">Back</button>
        </div>

        <div id="step5" class="step">
          <div class="progress">Step 5 of 5</div>

          <h2>Review Submission</h2>
          <div id="reviewBox" class="review-box"></div>

          <button id="submitButton" type="button" onclick="submitForm()">Submit to LinkFam</button>
          <button class="secondary" type="button" onclick="prevStep()">Back</button>
        </div>
      </form>

      <div id="statusBox" class="message-box"></div>
    </section>

    <section class="card success-screen" id="successMessage">
      <h1>Submission Received</h1>
      <p>Your submission was successfully sent to LinkFam for review.</p>
      <p class="small" id="successDetails"></p>
      <button type="button" onclick="window.location.reload()">Submit Another</button>
    </section>
  </main>

  <script>
    var PARSE_SERVER_URL = "https://parseapi.back4app.com";
    var PARSE_APP_ID = "2AxqUa732w8sQviO38zmLdWlT1oQaJpKbq2NdwsR";
    var PARSE_REST_API_KEY = "jjegdXfbfeyGjxXsmSaqXJm19c1UZL1pxWXwO5iv";

    var currentStep = 1;

    var businessCategories = [
      "Restaurant",
      "Retail",
      "Service",
      "Health",
      "Beauty",
      "Barbershop",
      "Legal",
      "Professional Services",
      "Other"
    ];

    var communityCategories = [
      "Food",
      "Housing",
      "Health & Mental Health",
      "Jobs",
      "Education",
      "Legal Aid",
      "Transportation",
      "Family Support",
      "Domestic Violence & Safety",
      "Reentry & Recovery",
      "Community Events",
      "Mutual Aid",
      "Clothing & Essentials",
      "Financial Help",
      "Veterans",
      "Faith & Spiritual"
    ];

    function byId(id) {
      return document.getElementById(id);
    }

    function getValue(id) {
      var element = byId(id);
      return element && element.value ? element.value.trim() : "";
    }

    function isBusiness() {
      return getValue("submissionType") === "Business";
    }

    function isCommunity() {
      return getValue("submissionType") === "Community Resource";
    }

    function isPlaceholder(value) {
      return !value || value.indexOf("PASTE_") !== -1 || value.indexOf("YOUR_") !== -1;
    }

    function showStatus(type, message) {
      var box = byId("statusBox");
      box.className = "message-box " + type;
      box.textContent = message;
      box.style.display = "block";
    }

    function clearStatus() {
      var box = byId("statusBox");
      box.className = "message-box";
      box.textContent = "";
      box.style.display = "none";
    }

    function showStep(stepNumber) {
      var i;
      var step;

      if (stepNumber < 1 || stepNumber > 5) return false;

      for (i = 1; i <= 5; i++) {
        step = byId("step" + i);
        step.className = i === stepNumber ? "step active" : "step";
      }

      currentStep = stepNumber;
      clearStatus();
      window.scrollTo(0, 0);
      return false;
    }

    function updateCategoryOptions() {
      var type = getValue("submissionType");
      var categorySelect = byId("category");
      var options = type === "Business" ? businessCategories : communityCategories;
      var i;

      categorySelect.innerHTML = '<option value="">Choose a category</option>';

      for (i = 0; i < options.length; i++) {
        categorySelect.innerHTML += '<option value="' + escapeHTML(options[i]) + '">' + escapeHTML(options[i]) + '</option>';
      }

      byId("nameLabel").textContent = type === "Business" ? "Business name" : "Resource name";
      byId("categoryLabel").textContent = type === "Business" ? "Business category/type" : "Resource category/type";
      byId("organizationGroup").style.display = type === "Community Resource" ? "block" : "none";
    }

    function nextStep() {
      if (!validateStep(currentStep)) return false;

      if (currentStep === 1) {
        updateCategoryOptions();
      }

      return showStep(currentStep + 1);
    }

    function prevStep() {
      return showStep(currentStep - 1);
    }

    function validateStep(stepNumber) {
      clearStatus();

      if (stepNumber === 1 && !getValue("submissionType")) {
        showStatus("error", "Please choose Business or Community Resource.");
        return false;
      }

      if (stepNumber === 2) {
        if (!getValue("name")) {
          showStatus("error", "Please enter a name.");
          return false;
        }

        if (!getValue("category")) {
          showStatus("error", "Please choose a category.");
          return false;
        }
      }

      return true;
    }

    function validateBeforeSubmit() {
      if (!getValue("submissionType")) {
        showStep(1);
        showStatus("error", "Failed: Missing submission type.");
        return false;
      }

      if (!getValue("name")) {
        showStep(2);
        showStatus("error", "Failed: Missing name.");
        return false;
      }

      if (!getValue("category")) {
        showStep(2);
        showStatus("error", "Failed: Missing category.");
        return false;
      }

      return true;
    }

    function escapeHTML(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function cleanData(data) {
      var cleaned = {};
      var key;

      for (key in data) {
        if (Object.prototype.hasOwnProperty.call(data, key)) {
          if (data[key] !== "" && data[key] !== null && typeof data[key] !== "undefined") {
            cleaned[key] = data[key];
          }
        }
      }

      return cleaned;
    }

    function getFormData() {
      var submissionType = getValue("submissionType");
      var category = getValue("category");
      var zip = getValue("zip");

      var data = {
        submissionType: submissionType,
        name: getValue("name"),
        type: category,
        category: category,
        primaryCategory: category,
        description: getValue("description"),
        phone: getValue("phone"),
        email: getValue("email"),
        website: getValue("website"),
        instagram: getValue("instagram"),
        address: getValue("address"),
        city: getValue("city"),
        state: getValue("state"),
        zip: zip,
        zipCode: zip,
        status: "pending",
        source: "github_pages_web_form"
      };

      if (submissionType === "Community Resource") {
        data.organizationName = getValue("organizationName");
        data.tags = [];
        data.isUrgent = false;
        data.isFree = false;
        data.verificationStatus = "unverified";
      }

      return cleanData(data);
    }

    function showReview() {
      if (!validateStep(1)) {
        showStep(1);
        return false;
      }

      if (!validateStep(2)) {
        showStep(2);
        return false;
      }

      var data = getFormData();

      byId("reviewBox").innerHTML =
        "<strong>Type:</strong> " + escapeHTML(data.submissionType) + "<br>" +
        "<strong>Name:</strong> " + escapeHTML(data.name) + "<br>" +
        "<strong>Category:</strong> " + escapeHTML(data.category) + "<br>" +
        (data.organizationName ? "<strong>Organization:</strong> " + escapeHTML(data.organizationName) + "<br>" : "") +
        "<strong>Description:</strong> " + escapeHTML(data.description || "Not provided") + "<br>" +
        "<strong>Phone:</strong> " + escapeHTML(data.phone || "Not provided") + "<br>" +
        "<strong>Email:</strong> " + escapeHTML(data.email || "Not provided") + "<br>" +
        "<strong>Website:</strong> " + escapeHTML(data.website || "Not provided") + "<br>" +
        "<strong>Instagram:</strong> " + escapeHTML(data.instagram || "Not provided") + "<br>" +
        "<strong>Address:</strong> " + escapeHTML(data.address || "Not provided") + "<br>" +
        "<strong>City:</strong> " + escapeHTML(data.city || "Not provided") + "<br>" +
        "<strong>State:</strong> " + escapeHTML(data.state || "Not provided") + "<br>" +
        "<strong>ZIP:</strong> " + escapeHTML(data.zip || "Not provided");

      showStep(5);
      showStatus("info", "Review your submission, then press Submit to LinkFam.");
      return false;
    }

    function getParseClassName(submissionType) {
      return submissionType === "Business" ? "BusinessSubmissions" : "CommunitySubmissions";
    }

    function parseErrorMessage(status, responseText) {
      var message = "HTTP " + status;

      try {
        var parsed = JSON.parse(responseText);

        if (parsed.error) {
          message += ": " + parsed.error;
        } else {
          message += ": " + responseText;
        }

        if (parsed.code) {
          message += " (Parse code " + parsed.code + ")";
        }
      } catch (error) {
        if (responseText) {
          message += ": " + responseText;
        }
      }

      return message;
    }

    function setBusy(isBusy) {
      var button = byId("submitButton");
      button.disabled = isBusy;
      button.textContent = isBusy ? "Submitting..." : "Submit to LinkFam";
    }

    function submitToBack4App(data) {
      return new Promise(function(resolve, reject) {
        if (typeof fetch !== "function") {
          reject(new Error("This browser does not support fetch()."));
          return;
        }

        if (isPlaceholder(PARSE_APP_ID)) {
          reject(new Error("Missing Back4App Application ID."));
          return;
        }

        if (isPlaceholder(PARSE_REST_API_KEY)) {
          reject(new Error("Missing Back4App REST API Key."));
          return;
        }

        var className = getParseClassName(data.submissionType);
        var url = PARSE_SERVER_URL + "/classes/" + className;
        var payload = {};
        var key;

        for (key in data) {
          if (Object.prototype.hasOwnProperty.call(data, key) && key !== "submissionType") {
            payload[key] = data[key];
          }
        }

        fetch(url, {
          method: "POST",
          headers: {
            "X-Parse-Application-Id": PARSE_APP_ID,
            "X-Parse-REST-API-Key": PARSE_REST_API_KEY,
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        })
          .then(function(response) {
            return response.text().then(function(responseText) {
              if (!response.ok) {
                reject(new Error(parseErrorMessage(response.status, responseText)));
                return;
              }

              try {
                resolve(responseText ? JSON.parse(responseText) : {});
              } catch (error) {
                resolve({ rawResponse: responseText });
              }
            });
          })
          .catch(function(error) {
            reject(error);
          });
      });
    }

    function submitForm() {
      clearStatus();

      if (!validateBeforeSubmit()) {
        return false;
      }

      var data = getFormData();

      setBusy(true);
      showStatus("info", "Submitting to LinkFam... Please wait.");

      submitToBack4App(data)
        .then(function(result) {
          byId("formCard").style.display = "none";
          byId("successMessage").style.display = "block";

          if (result && result.objectId) {
            byId("successDetails").textContent = "Submission ID: " + result.objectId;
          }

          window.scrollTo(0, 0);
        })
        .catch(function(error) {
          showStatus("error", "Failed: " + error.message);
        })
        .then(function() {
          setBusy(false);
        });

      return false;
    }
  </script>
</body>
</html>
